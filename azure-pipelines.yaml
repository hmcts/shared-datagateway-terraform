name: ctsc-datagateway-terraform
trigger:
  batch: true
  branches:
    include:
      - master

resources:
  repositories:
    - repository: cnp-azuredevops-libraries
      type: github
      ref: master
      name: hmcts/cnp-azuredevops-libraries
      endpoint: 'hmcts (1)'

parameters:
  - name: environment_components
    displayName: Component to Run
    type: object
    default:
      - deployment: "ctsc-datagateway"
        environment: "nonprod"
        targetEnvironment: "nonprod"
        dependsOn: "Precheck"
      - deployment: "ctsc-datagateway"
        environment: "prod"
        targetEnvironment: "prod"
        dependsOn: "Precheck"
  - name: overrideAction
    type: string
    default: plan
    values:
      - plan
      - apply
      - destroy
  - name: location
    displayName: Location
    type: string
    default: "UK South"
    values:
      - "UK South"

variables:
  - name: tfversion
    value: 1.0.10
  - name: project
    value: ctsc
  - name: timeoutInMinutes
    value: "60"
  - name: agentPool
    value: "ubuntu-latest"
  - name: build
    value: $(Build.BuildNumber)
  - name: isMaster
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/master')]
  - name: product
    value: "ctsc-datagateway"

stages:
  - stage: Precheck
    jobs:
      - job:
        pool:
          vmImage: ${{ variables.agentPool }}
        timeoutInMinutes: ${{ variables.timeoutInMinutes }}
        steps:
          - template: steps/terraform-precheck.yaml@cnp-azuredevops-libraries
            parameters:
              keyvaultName: 'infra-vault-nonprod'
              keyvaultSecret: 'azure-devops-token'
              serviceConnection: 'DCD-CFT-Sandbox'

  - ${{ each deployment in parameters.environment_components }}:
      - stage: Infrastucture_${{ replace(deployment.location, ' ', '_') }}_${{ deployment.environment }}
        displayName: Infrastucture_${{ replace(deployment.location, ' ', '_') }}_${{ deployment.environment }}
        condition: succeeded()
        jobs:
          - job: Test_Step
            steps:
            - task: Bash@3
              inputs:
                targetType: 'inline'
                script: echo "pipeline is happy